const INDEX = [
  ["Un. 1–2","am/is/are + questions","Present"],
  ["Un. 3–4","Present Continuous + questions","Present"],
  ["Un. 5–7","Present Simple (afirm, neg, quest)","Present"],
  ["Un. 8","Continuous vs Simple ⭐","Present"],
  ["Un. 9","I have / I've got","Present"],
  ["Un. 10","was/were","Past"],
  ["Un. 11","Past Simple afirmativo","Past"],
  ["Un. 12","I didn't / Did you? ⭐","Past"],
  ["Un. 13–14","Past Continuous + vs Simple ⭐","Past"],
  ["Un. 15–18","Present Perfect 1–4","Perf."],
  ["Un. 19","for / since / ago","Perf."],
  ["Un. 20","Perfect vs Past Simple ⭐⭐","Perf."],
  ["Un. 21–22","Passive","Passive"],
  ["Un. 25–28","Future (will / going to)","Future"],
  ["Un. 29–33","Modals (might, can, must, should)","Modal"],
  ["Un. 35","used to","Past"],
  ["Un. 99–100","Conditionals (if)","Cond."],
];

// ─── ESTADO ───────────────────────────────────────────────────────────────────
let currentTab = "overview";
let selWeek = 1;
let selDay  = null;
let done = JSON.parse(localStorage.getItem("diego_done") || "{}");

function saveDone() { localStorage.setItem("diego_done", JSON.stringify(done)); }

function showToast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg; el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 1800);
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function dayMin(d)    { return d.tasks.reduce((a,t)=>a+t.min,0); }
function dayDoneN(wn,d){ return d.tasks.filter((_,i)=>done[`${wn}-${d.id}-${i}`]).length; }
function wkDone(w)    { return w.days.reduce((a,d)=>a+dayDoneN(w.n,d),0); }
function wkTotal(w)   { return w.days.reduce((a,d)=>a+d.tasks.length,0); }
function pct(a,b)     { return b===0?0:Math.round(a/b*100); }

function typeBadge(type, min) {
  const c = TC[type]||TC.revisão;
  return `<span class="type-badge" style="background:${c.bg};color:${c.text}">
    <span class="type-dot" style="background:${c.dot}"></span>${min}m
  </span>`;
}

// ─── TABS ────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  ["overview","week","index"].forEach(t=>{
    document.getElementById("tab-"+t).style.display = t===tab?"block":"none";
    document.getElementById("btn-"+t).classList.toggle("active", t===tab);
  });
  render();
}

// ─── RENDER OVERVIEW ─────────────────────────────────────────────────────────
function renderOverview() {
  let cards = WEEKS.map(w=>{
    const wd=wkDone(w), wt=wkTotal(w), p=pct(wd,wt);
    const wMin = w.days.reduce((a,d)=>a+dayMin(d),0);
    return `<button class="week-card ${selWeek===w.n?'active':''}" onclick="selectWeek(${w.n})">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span class="wn">Semana ${w.n}</span>
        <span style="font-size:10px;color:#9ca3af">${wMin}min</span>
      </div>
      <div class="wg">${w.murphy} · ${w.grammar}</div>
      <div class="wbar-bg"><div class="wbar" style="width:${p}%;background:${p===100?'#10b981':'#3b82f6'}"></div></div>
      <div class="wpct">${wd}/${wt} tarefas · ${p}%</div>
    </button>`;
  }).join("");

  document.getElementById("tab-overview").innerHTML = `
    <div style="background:#fff;border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.08)">
      <div style="font-weight:700;font-size:14px;margin-bottom:10px">⏱️ Carga Horária</div>
      <div style="display:flex;gap:8px">
        ${[["Seg–Sex","5×1h","5h/sem","#3b82f6"],["Sábado","1×2h","2h","#1e3a5f"],["Domingo","1×2h","2h","#6b7280"],["Total","7 dias","9h/sem","#10b981"]].map(([d,s,t,c])=>`
          <div style="flex:1;text-align:center;padding:8px 4px;border-radius:10px;border-top:3px solid ${c};background:#f9fafb">
            <div style="font-weight:800;font-size:12px;color:${c}">${d}</div>
            <div style="font-size:10px;color:#6b7280">${s}</div>
            <div style="font-weight:700;font-size:11px;color:#111;margin-top:2px">${t}</div>
          </div>`).join("")}
      </div>
    </div>
    <div style="background:#fff;border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.08)">
      <div style="font-weight:700;font-size:14px;margin-bottom:10px">📋 Semanas da Fase 1</div>
      <div class="week-grid">${cards}</div>
      <div style="background:#fef9c3;border-radius:10px;padding:10px;font-size:12px;color:#92400e">
        🗓️ Semanas 9–12 (Passive, Future, Modals) e Fases 2–3 serão detalhadas conforme você avança.
      </div>
    </div>`;
}

function selectWeek(n) {
  selWeek = n; selDay = null;
  switchTab("week");
}

// ─── RENDER WEEK ─────────────────────────────────────────────────────────────
function renderWeek() {
  const week = WEEKS.find(w=>w.n===selWeek);
  const wd=wkDone(week), wt=wkTotal(week), p=pct(wd,wt);

  // Day selector
  const daySel = week.days.map(d=>{
    const col=DCOLOR[d.id], dD=dayDoneN(week.n,d), isSel=selDay===d.id;
    return `<button class="day-btn" onclick="selectDay('${d.id}')"
      style="border-color:${isSel?col:'#e5e7eb'};background:${isSel?col:'#fff'};color:${isSel?'#fff':'#374151'}">
      <div class="dl">${DLABEL[d.id]}</div>
      <div class="dh">${d.id==="sab"||d.id==="dom"?"2h":"1h"}</div>
      <div class="dp">${dD}/${d.tasks.length}</div>
    </button>`;
  }).join("");

  // Day content
  let dayContent = "";
  if (!selDay) {
    dayContent = `<div class="day-list">` + week.days.map(d=>{
      const col=DCOLOR[d.id], mins=dayMin(d), dD=dayDoneN(week.n,d);
      const miniBar = d.tasks.map(tk=>{
        const c=TC[tk.type]||TC.revisão;
        return `<div style="flex:${tk.min};background:${c.dot};min-width:2px"></div>`;
      }).join("");
      return `<button class="day-row" onclick="selectDay('${d.id}')" style="width:100%;gap:0">
        <div class="day-icon" style="background:${col}">
          <span>${DLABEL[d.id]}</span>
          <span>${d.id==="sab"||d.id==="dom"?"2h":"1h"}</span>
        </div>
        <div class="day-info">
          <div class="df">${d.focus}</div>
          <div class="ds">${d.tasks.length} tarefas · ${mins}min</div>
          <div class="day-mini-bar">${miniBar}</div>
        </div>
        <div class="day-count">
          <div class="dc" style="color:${dD===d.tasks.length?'#10b981':'#374151'}">${dD}/${d.tasks.length}</div>
          <div class="dl2">tarefas</div>
        </div>
        <span class="arrow">›</span>
      </button>`;
    }).join("") + `</div>`;
  } else {
    const d = week.days.find(x=>x.id===selDay);
    const col=DCOLOR[d.id], mins=dayMin(d), avail=THEORY[d.id];
    const timeColor = mins>avail?"#ef4444":"#10b981";
    const tasks = d.tasks.map((tk,ti)=>{
      const key=`${week.n}-${d.id}-${ti}`;
      const isDone=!!done[key];
      const c=TC[tk.type]||TC.revisão;
      return `<div class="task-item" onclick="toggleTask('${key}','${col}','${week.n}','${d.id}','${ti}')">
        <div class="task-check" id="chk-${key}" style="border-color:${isDone?col:'#d1d5db'};background:${isDone?col:'#fff'}">
          ${isDone?"✓":""}
        </div>
        <span class="task-text ${isDone?'done':''}" id="txt-${key}">${tk.text}</span>
        ${typeBadge(tk.type,tk.min)}
      </div>`;
    }).join("");

    // Time bar
    const barSegs = d.tasks.map(tk=>{
      const c=TC[tk.type]||TC.revisão;
      return `<div style="flex:${tk.min};background:${c.dot};min-width:2px"></div>`;
    }).join("");
    const typeTotals = {};
    d.tasks.forEach(tk=>{ typeTotals[tk.type]=(typeTotals[tk.type]||0)+tk.min; });
    const typeTags = Object.entries(typeTotals).map(([tp,tot])=>{
      const c=TC[tp]||TC.revisão;
      return `<span class="type-tag" style="background:${c.bg};color:${c.text}">${tp}: ${tot}min</span>`;
    }).join("");

    dayContent = `
      <div style="background:#fff;border-radius:14px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.08);border-top:4px solid ${col}">
        <div class="task-header">
          <div style="display:flex;align-items:center">
            <span class="day-label" style="background:${col}">${DLABEL[d.id]}</span>
            <span class="day-focus">${d.focus}</span>
          </div>
          <span class="time-badge-header" style="color:${timeColor}">${mins}/${avail}min</span>
        </div>
        ${tasks}
        <div class="time-bar-wrap">
          <div class="time-bar-row"><span>Distribuição</span><span style="color:${timeColor};font-weight:700">${mins}/${avail}min</span></div>
          <div class="time-bar">${barSegs}</div>
          <div class="type-tags">${typeTags}</div>
        </div>
      </div>`;
  }

  document.getElementById("tab-week").innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
      <button onclick="prevWeek()" ${selWeek===1?"disabled":""} style="padding:6px 14px;border-radius:8px;border:1px solid #e5e7eb;background:${selWeek===1?"#f3f4f6":"#fff"};font-size:16px">‹</button>
      <div style="flex:1;text-align:center">
        <div style="font-weight:800;font-size:15px;color:#1e3a5f">Semana ${week.n} — ${week.grammar}</div>
        <div style="font-size:12px;color:#6b7280">${week.murphy} · BBC: ${week.bbc}</div>
      </div>
      <button onclick="nextWeek()" ${selWeek===WEEKS.length?"disabled":""} style="padding:6px 14px;border-radius:8px;border:1px solid #e5e7eb;background:${selWeek===WEEKS.length?"#f3f4f6":"#fff"};font-size:16px">›</button>
    </div>
    <div class="week-info">
      <div class="note-badge">💡 ${week.note}</div>
      <div class="prod-text"><strong>✍️ Produção:</strong> ${week.production}</div>
      <div class="prog-row"><span>Progresso</span><span>${wd}/${wt} tarefas</span></div>
      <div class="prog-bg"><div class="prog-bar" style="width:${p}%;background:${p===100?'#10b981':'#3b82f6'}"></div></div>
    </div>
    <div class="day-scroll">${daySel}</div>
    ${dayContent}`;
}

function selectDay(id) {
  selDay = selDay===id ? null : id;
  renderWeek();
}
function prevWeek() { if(selWeek>1){selWeek--;selDay=null;renderWeek();} }
function nextWeek() { if(selWeek<WEEKS.length){selWeek++;selDay=null;renderWeek();} }

function toggleTask(key, col, wn, did, ti) {
  done[key] = !done[key];
  saveDone();
  const chk = document.getElementById("chk-"+key);
  const txt = document.getElementById("txt-"+key);
  if (chk) {
    chk.style.borderColor = done[key]?col:"#d1d5db";
    chk.style.background  = done[key]?col:"#fff";
    chk.textContent = done[key]?"✓":"";
  }
  if (txt) {
    txt.classList.toggle("done", done[key]);
  }
  if(done[key]) showToast("✅ Tarefa concluída!");
}

// ─── RENDER INDEX ─────────────────────────────────────────────────────────────
function renderIndex() {
  const rows = INDEX.map(([u,t,cat])=>`
    <div class="idx-row">
      <span class="idx-un">${u}</span>
      <span style="flex:1;color:#374151">${t}</span>
      <span class="idx-cat">${cat}</span>
    </div>`).join("");
  document.getElementById("tab-index").innerHTML = `
    <div style="background:#fff;border-radius:14px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.08)">
      <div style="font-weight:700;font-size:14px;margin-bottom:12px">📖 Essential Grammar in Use 3ª Ed.</div>
      ${rows}
      <div style="margin-top:10px;background:#f0fdf4;border-radius:8px;padding:10px;font-size:12px;color:#166534">
        ✅ Unidades marcadas com ⭐ são as mais críticas para brasileiros — dedique atenção extra.
      </div>
    </div>`;
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  if(currentTab==="overview") renderOverview();
  if(currentTab==="week")     renderWeek();
  if(currentTab==="index")    renderIndex();
}

render();
</script>
